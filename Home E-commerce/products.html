<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shop | Home-Refined</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <!-- HEADER & NAVIGATION -->
    <header>
      <nav class="top-nav">
        <div class="logo">
          <a href="index.html"><i class="fas fa-home"></i> Home-Refined</a>
        </div>

        <ul class="nav-menu">
          <li><a href="products.html">Shop</a></li>
          <li><a href="index.html#categories">Categories</a></li>
          <li><a href="dashboard.html">Dashboard</a></li>
        </ul>

        <div class="nav-right">
          <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input
              type="text"
              class="search-input"
              placeholder="Search products..."
              id="globalSearch"
            />
          </div>

          <button class="icon-btn" data-cart-btn title="Shopping Cart">
            <i class="fas fa-shopping-cart"></i>
            <span class="badge" style="display: none">0</span>
          </button>
          <div class="user-menu">
            <button class="user-btn" id="userBtn" style="display: none">
              <i class="fas fa-user-circle"></i>
              <span id="userDisplayName"></span>
            </button>
            <div id="authButtons">
              <a href="login.html" class="btn btn-outline btn-small">
                <i class="fas fa-sign-in-alt"></i> Sign In
              </a>
              <a href="signup.html" class="btn btn-primary btn-small">
                <i class="fas fa-user-plus"></i> Sign Up
              </a>
            </div>
          </div>
        </div>
      </nav>
    </header>

    <!-- MINI CART SIDEBAR -->
    <div class="mini-cart">
      <div class="mini-cart-header">
        <h2 class="mini-cart-title">Your Cart</h2>
        <button class="close-cart"><i class="fas fa-times"></i></button>
      </div>
      <div class="mini-cart-items"></div>
      <div class="mini-cart-summary"></div>
      <div class="mini-cart-actions">
        <button
          class="btn btn-primary"
          style="width: 100%"
          onclick="goToCheckout()"
        >
          Proceed to Checkout
        </button>
        <button
          class="btn btn-outline"
          style="width: 100%"
          onclick="
            document.querySelector('.mini-cart').classList.remove('open')
          "
        >
          Continue Shopping
        </button>
      </div>
    </div>

    <!-- PAGE CONTENT -->
    <div class="container" style="padding: var(--spacing-xl) 0">
      <h1 style="margin-bottom: var(--spacing-lg)">Shop All Products</h1>

      <!-- FILTERS & PRODUCTS -->
      <div class="products-container">
        <!-- SIDEBAR FILTERS -->
        <aside class="filters-sidebar">
          <div class="filter-group">
            <h3 class="filter-title">Categories</h3>
            <div id="categoryFilters"></div>
          </div>

          <div class="filter-group">
            <h3 class="filter-title">Price Range</h3>
            <div class="price-range">
              <input type="number" id="minPrice" placeholder="Min" value="0" />
              <span>-</span>
              <input
                type="number"
                id="maxPrice"
                placeholder="Max"
                value="2000"
              />
            </div>
            <button
              class="btn btn-small btn-outline"
              style="margin-top: var(--spacing-sm); width: 100%"
            >
              Apply
            </button>
          </div>

          <div class="filter-group">
            <h3 class="filter-title">Stock Status</h3>
            <div class="filter-option">
              <input type="checkbox" id="inStock" checked />
              <label for="inStock">In Stock Only</label>
            </div>
            <div class="filter-option">
              <input type="checkbox" id="onSale" />
              <label for="onSale">On Sale</label>
            </div>
          </div>

          <div class="filter-group">
            <h3 class="filter-title">Brands</h3>
            <div id="brandFilters"></div>
          </div>
        </aside>

        <!-- PRODUCTS GRID -->
        <main>
          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              margin-bottom: var(--spacing-lg);
            "
          >
            <div id="resultsCount" style="color: var(--text-light)">
              Showing all products
            </div>
            <select
              id="sortBy"
              style="
                padding: 8px 12px;
                border: 1px solid var(--border);
                border-radius: 4px;
              "
            >
              <option value="newest">Newest</option>
              <option value="priceLow">Price: Low to High</option>
              <option value="priceHigh">Price: High to Low</option>
              <option value="rating">Top Rated</option>
              <option value="popular">Most Popular</option>
            </select>
          </div>

          <div class="products-grid" id="productsGrid"></div>

          <div
            id="noResults"
            style="
              text-align: center;
              padding: var(--spacing-xl);
              color: var(--text-light);
              display: none;
            "
          >
            <p style="font-size: 1.1rem">
              No products found matching your filters.
            </p>
            <button
              class="btn btn-primary"
              style="margin-top: var(--spacing-md)"
              onclick="clearFilters()"
            >
              Clear Filters
            </button>
          </div>
        </main>
      </div>
    </div>

    <!-- FOOTER -->
    <footer
      style="
        background: var(--primary);
        color: white;
        padding: var(--spacing-xl) var(--spacing-lg);
        text-align: center;
        margin-top: var(--spacing-xl);
      "
    >
      <div class="container">
        <p>&copy; 2026 Home-Refined. All rights reserved.</p>
      </div>
    </footer>

    <!-- SCRIPTS -->
    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script>
      class ProductFilter {
        constructor() {
          this.filters = {
            categories: [],
            minPrice: 0,
            maxPrice: 2000,
            inStock: true,
            onSale: false,
            brands: [],
            search: "",
          };
          this.initializeFromURL();
        }

        initializeFromURL() {
          const params = new URLSearchParams(window.location.search);
          if (params.has("category")) {
            this.filters.categories = [params.get("category")];
          }
          if (params.has("search")) {
            this.filters.search = params.get("search");
          }
        }

        applyFilters() {
          let results = PRODUCTS;

          // Search filter
          if (this.filters.search) {
            results = searchProducts(this.filters.search);
          }

          // Category filter
          if (this.filters.categories.length > 0) {
            results = results.filter((p) =>
              this.filters.categories.includes(p.category),
            );
          }

          // Price filter
          results = results.filter(
            (p) =>
              p.price >= this.filters.minPrice &&
              p.price <= this.filters.maxPrice,
          );

          // Stock filter
          if (this.filters.inStock) {
            results = results.filter((p) => p.inStock);
          }

          // Sale filter
          if (this.filters.onSale) {
            results = results.filter((p) => p.badge === "Sale");
          }

          // Brand filter
          if (this.filters.brands.length > 0) {
            results = results.filter((p) =>
              this.filters.brands.includes(p.brand),
            );
          }

          return results;
        }

        sort(results, sortBy) {
          const copies = [...results];
          switch (sortBy) {
            case "priceLow":
              return copies.sort((a, b) => a.price - b.price);
            case "priceHigh":
              return copies.sort((a, b) => b.price - a.price);
            case "rating":
              return copies.sort((a, b) => b.rating - a.rating);
            case "popular":
              return copies.sort((a, b) => b.reviews - a.reviews);
            default:
              return copies;
          }
        }
      }

      const productFilter = new ProductFilter();

      function initializeFilters() {
        // Categories
        const categories = getCategories();
        const categoryContainer = document.getElementById("categoryFilters");
        categoryContainer.innerHTML = categories
          .map(
            (cat) => `
        <div class="filter-option">
          <input type="checkbox" id="cat-${cat}" data-category="${cat}" ${productFilter.filters.categories.includes(cat) ? "checked" : ""}>
          <label for="cat-${cat}">${cat}</label>
        </div>
      `,
          )
          .join("");

        categoryContainer
          .querySelectorAll('input[type="checkbox"]')
          .forEach((checkbox) => {
            checkbox.addEventListener("change", (e) => {
              const category = e.target.dataset.category;
              if (e.target.checked) {
                productFilter.filters.categories.push(category);
              } else {
                productFilter.filters.categories =
                  productFilter.filters.categories.filter(
                    (c) => c !== category,
                  );
              }
              renderProducts();
            });
          });

        // Brands
        const brands = [...new Set(PRODUCTS.map((p) => p.brand))].sort();
        const brandContainer = document.getElementById("brandFilters");
        brandContainer.innerHTML = brands
          .map(
            (brand) => `
        <div class="filter-option">
          <input type="checkbox" id="brand-${brand}" data-brand="${brand}">
          <label for="brand-${brand}">${brand}</label>
        </div>
      `,
          )
          .join("");

        brandContainer
          .querySelectorAll('input[type="checkbox"]')
          .forEach((checkbox) => {
            checkbox.addEventListener("change", (e) => {
              const brand = e.target.dataset.brand;
              if (e.target.checked) {
                productFilter.filters.brands.push(brand);
              } else {
                productFilter.filters.brands =
                  productFilter.filters.brands.filter((b) => b !== brand);
              }
              renderProducts();
            });
          });

        // Stock filter
        document.getElementById("inStock").addEventListener("change", (e) => {
          productFilter.filters.inStock = e.target.checked;
          renderProducts();
        });

        // Sale filter
        document.getElementById("onSale").addEventListener("change", (e) => {
          productFilter.filters.onSale = e.target.checked;
          renderProducts();
        });

        // Price filter
        document
          .querySelector('[style*="margin-top"]')
          .addEventListener("click", () => {
            productFilter.filters.minPrice =
              parseFloat(document.getElementById("minPrice").value) || 0;
            productFilter.filters.maxPrice =
              parseFloat(document.getElementById("maxPrice").value) || 2000;
            renderProducts();
          });

        // Sort
        document
          .getElementById("sortBy")
          .addEventListener("change", renderProducts);
      }

      function renderProducts() {
        const results = productFilter.applyFilters();
        const sortBy = document.getElementById("sortBy").value;
        const sorted = productFilter.sort(results, sortBy);

        const grid = document.getElementById("productsGrid");
        const noResults = document.getElementById("noResults");
        const resultsCount = document.getElementById("resultsCount");

        if (sorted.length === 0) {
          grid.innerHTML = "";
          noResults.style.display = "block";
          resultsCount.textContent = "No products found";
          return;
        }

        noResults.style.display = "none";
        resultsCount.textContent = `Showing ${sorted.length} product${sorted.length !== 1 ? "s" : ""}`;

        grid.innerHTML = sorted
          .map(
            (product) => `
        <div class="product-card">
          <div class="product-image">
            <img src="${product.image}" alt="${product.name}">
            <div class="product-badges">
              ${product.badge ? `<span class="badge-tag">${product.badge}</span>` : ""}
              ${product.inStock ? '<span class="badge-tag badge-instock">In Stock</span>' : '<span class="badge-tag" style="background: #999;">Out of Stock</span>'}
            </div>
          </div>
          <div class="product-info">
            <div class="product-brand">${product.brand}</div>
            <div class="product-name"><a href="product-detail.html?id=${product.id}">${product.name}</a></div>
            <div class="product-rating">
              <span class="stars">★★★★★</span>
              <span>${product.reviews} reviews</span>
            </div>
            <div class="product-footer">
              <div>
                ${product.originalPrice ? `<span class="product-price-old">$${product.originalPrice.toFixed(2)}</span>` : ""}
                <div class="product-price">$${product.price.toFixed(2)}</div>
              </div>
              <button class="quick-add-btn" data-add-to-cart data-product-id="${product.id}" ${!product.inStock ? "disabled" : ""}>+</button>
            </div>
          </div>
        </div>
      `,
          )
          .join("");
      }

      function clearFilters() {
        productFilter.filters = {
          categories: [],
          minPrice: 0,
          maxPrice: 2000,
          inStock: true,
          onSale: false,
          brands: [],
          search: "",
        };
        document
          .querySelectorAll('input[type="checkbox"]')
          .forEach((cb) => (cb.checked = false));
        document.getElementById("inStock").checked = true;
        renderProducts();
      }

      function goToCheckout() {
        window.location.href = "checkout.html";
      }

      document.addEventListener("DOMContentLoaded", () => {
        // Check if user is logged in
        const userDisplayName = localStorage.getItem("userDisplayName");
        const userBtn = document.getElementById("userBtn");
        const authButtons = document.getElementById("authButtons");

        if (userDisplayName) {
          userBtn.style.display = "flex";
          authButtons.style.display = "none";
          document.getElementById("userDisplayName").textContent =
            userDisplayName;

          // Add click handler to logout
          userBtn.addEventListener("click", logout);
        }

        initializeFilters();
        renderProducts();
      });

      function logout() {
        localStorage.removeItem("userDisplayName");
        localStorage.removeItem("userEmail");
        localStorage.removeItem("userAccountType");
        window.location.href = "products.html";
      }

      document.getElementById("globalSearch").addEventListener("keyup", (e) => {
        if (e.key === "Enter" && e.target.value.trim()) {
          productFilter.filters.search = e.target.value;
          renderProducts();
        }
      });
    </script>
  </body>
</html>
