<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Home-Refined</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/main.css" />
    <style>
      .auth-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--light-bg);
        padding: var(--spacing-lg);
      }

      .auth-card {
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 16px;
        padding: 3rem;
        width: 100%;
        max-width: 450px;
        box-shadow: var(--shadow-lg);
      }

      .auth-header {
        text-align: center;
        margin-bottom: 2.5rem;
      }

      .auth-header h1 {
        font-size: 2rem;
        margin-bottom: var(--spacing-sm);
        background: var(--gradient-2);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .auth-header p {
        color: var(--text-light);
      }

      .form-group {
        margin-bottom: var(--spacing-md);
      }

      .form-group label {
        display: block;
        margin-bottom: var(--spacing-xs);
        font-weight: 600;
        color: var(--text-dark);
      }

      .form-group input {
        width: 100%;
        padding: 12px var(--spacing-md);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        font-size: 1rem;
        transition: var(--transition);
      }

      .form-group input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
      }

      .remember-forgot {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: var(--spacing-lg);
        font-size: 0.9rem;
      }

      .remember-forgot a {
        color: var(--accent);
        text-decoration: none;
      }

      .remember-forgot a:hover {
        text-decoration: underline;
      }

      .auth-button {
        width: 100%;
        padding: 12px;
        background: var(--gradient-2);
        color: var(--secondary);
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        box-shadow: var(--shadow-md);
      }

      .auth-button:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-lg);
      }

      .divider {
        display: flex;
        align-items: center;
        gap: var(--spacing-md);
        margin: 2rem 0;
        color: var(--text-muted);
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border-color);
      }

      .social-buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--spacing-md);
        margin-bottom: var(--spacing-lg);
      }

      .social-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: var(--spacing-sm);
        padding: 12px;
        border: 1px solid var(--border-color);
        background: var(--secondary);
        border-radius: 8px;
        cursor: pointer;
        transition: var(--transition);
        font-weight: 600;
        color: var(--text-dark);
      }

      .social-btn:hover {
        border-color: var(--accent);
        background: var(--accent-light);
      }

      .auth-footer {
        text-align: center;
        color: var(--text-light);
      }

      .auth-footer a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
      }

      .auth-footer a:hover {
        text-decoration: underline;
      }

      .account-type {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--spacing-md);
        margin-bottom: var(--spacing-lg);
      }

      .account-type-btn {
        padding: 12px;
        border: 2px solid var(--border-color);
        background: var(--secondary);
        border-radius: 8px;
        cursor: pointer;
        transition: var(--transition);
        font-weight: 600;
        color: var(--text-dark);
      }

      .account-type-btn.active {
        border-color: var(--accent);
        background: var(--accent-light);
        color: var(--accent-dark);
      }
    </style>
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <h1><i class="fas fa-home"></i> Home-Refined</h1>
          <p>Welcome back to your account</p>
        </div>

        <div class="account-type">
          <button
            type="button"
            class="account-type-btn active"
            data-type="buyer"
          >
            <i class="fas fa-shopping-bag"></i> Buyer
          </button>
          <button type="button" class="account-type-btn" data-type="seller">
            <i class="fas fa-store"></i> Seller
          </button>
        </div>

        <form id="loginForm">
          <div class="form-group">
            <label><i class="fas fa-envelope"></i> Email Address</label>
            <input type="email" placeholder="you@example.com" required />
          </div>

          <div class="form-group">
            <label><i class="fas fa-lock"></i> Password</label>
            <input type="password" placeholder="••••••••" required />
          </div>

          <div class="remember-forgot">
            <label
              style="
                display: flex;
                align-items: center;
                gap: var(--spacing-xs);
                cursor: pointer;
                font-weight: 400;
              "
            >
              <input type="checkbox" style="width: auto; margin: 0" />
              Remember me
            </label>
            <a href="#forgot">Forgot password?</a>
          </div>

          <button type="submit" class="auth-button">Sign In</button>
        </form>

        <div class="divider">Or</div>

        <div class="social-buttons">
          <button class="social-btn" type="button">
            <i class="fab fa-google"></i> Google
          </button>
          <button class="social-btn" type="button">
            <i class="fab fa-apple"></i> Apple
          </button>
        </div>

        <div class="auth-footer">
          Don't have an account? <a href="signup.html">Create one now</a>
        </div>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        let selectedAccountType = "buyer";

        const accountTypeButtons =
          document.querySelectorAll(".account-type-btn");

        accountTypeButtons.forEach((btn) => {
          btn.addEventListener("click", function () {
            accountTypeButtons.forEach((b) => b.classList.remove("active"));
            this.classList.add("active");
            selectedAccountType = this.dataset.type;
          });
        });

        const loginForm = document.getElementById("loginForm");
        if (!loginForm) {
          console.error("loginForm not found on page");
          return;
        }

        loginForm.addEventListener("submit", function (e) {
          e.preventDefault();
          console.log("login form submitted");

          const emailInput = document.querySelector('input[type="email"]');
          if (!emailInput) {
            console.error("email input not found");
            return;
          }
          const email = emailInput.value;

          let displayName = localStorage.getItem("userDisplayName");
          if (!displayName) {
            displayName = "User";
          }

          localStorage.setItem("userEmail", email);
          localStorage.setItem("userAccountType", selectedAccountType);

          alert("Login successful!");
          setTimeout(() => (window.location.href = "index.html"), 1000);
        });
      });
    </script>
  </body>
</html>
