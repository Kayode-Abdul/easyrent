<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up | Home-Refined</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/main.css" />
    <style>
      .auth-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--light-bg);
        padding: var(--spacing-lg);
      }

      .auth-card {
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 16px;
        padding: 3rem;
        width: 100%;
        max-width: 550px;
        box-shadow: var(--shadow-lg);
      }

      .auth-header {
        text-align: center;
        margin-bottom: 2.5rem;
      }

      .auth-header h1 {
        font-size: 2rem;
        margin-bottom: var(--spacing-sm);
        background: var(--gradient-2);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .auth-header p {
        color: var(--text-light);
      }

      .account-type {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--spacing-md);
        margin-bottom: var(--spacing-lg);
      }

      .account-type-btn {
        padding: 12px;
        border: 2px solid var(--border-color);
        background: var(--secondary);
        border-radius: 8px;
        cursor: pointer;
        transition: var(--transition);
        font-weight: 600;
        color: var(--text-dark);
      }

      .account-type-btn.active {
        border-color: var(--accent);
        background: var(--accent-light);
        color: var(--accent-dark);
      }

      .form-group {
        margin-bottom: var(--spacing-md);
      }

      .form-group label {
        display: block;
        margin-bottom: var(--spacing-xs);
        font-weight: 600;
        color: var(--text-dark);
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--spacing-md);
      }

      .form-row .form-group {
        margin-bottom: 0;
      }

      .form-group input {
        width: 100%;
        padding: 12px var(--spacing-md);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        font-size: 1rem;
        transition: var(--transition);
      }

      .form-group input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
      }

      .password-strength {
        font-size: 0.85rem;
        margin-top: 4px;
        height: 4px;
        background: var(--light-bg);
        border-radius: 2px;
        overflow: hidden;
      }

      .password-strength-bar {
        height: 100%;
        background: var(--error);
        width: 0%;
        transition: var(--transition);
      }

      .terms {
        display: flex;
        align-items: flex-start;
        gap: var(--spacing-sm);
        margin-bottom: var(--spacing-lg);
        font-size: 0.9rem;
      }

      .terms input[type="checkbox"] {
        margin-top: 4px;
      }

      .terms a {
        color: var(--accent);
        text-decoration: none;
      }

      .terms a:hover {
        text-decoration: underline;
      }

      .auth-button {
        width: 100%;
        padding: 12px;
        background: var(--gradient-2);
        color: var(--secondary);
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        box-shadow: var(--shadow-md);
      }

      .auth-button:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-lg);
      }

      .divider {
        display: flex;
        align-items: center;
        gap: var(--spacing-md);
        margin: 2rem 0;
        color: var(--text-muted);
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border-color);
      }

      .social-buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--spacing-md);
        margin-bottom: var(--spacing-lg);
      }

      .social-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: var(--spacing-sm);
        padding: 12px;
        border: 1px solid var(--border-color);
        background: var(--secondary);
        border-radius: 8px;
        cursor: pointer;
        transition: var(--transition);
        font-weight: 600;
        color: var(--text-dark);
      }

      .social-btn:hover {
        border-color: var(--accent);
        background: var(--accent-light);
      }

      .auth-footer {
        text-align: center;
        color: var(--text-light);
      }

      .auth-footer a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
      }

      .auth-footer a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <h1><i class="fas fa-home"></i> Home-Refined</h1>
          <p>Create your account and start shopping</p>
        </div>

        <div class="account-type">
          <button class="account-type-btn active" data-type="buyer">
            <i class="fas fa-shopping-bag"></i> Buyer
          </button>
          <button class="account-type-btn" data-type="seller">
            <i class="fas fa-store"></i> Seller
          </button>
        </div>

        <form id="signupForm">
          <div class="form-group">
            <label><i class="fas fa-user-tag"></i> Display Name</label>
            <input type="text" placeholder="Your display name" id="displayName" required />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label><i class="fas fa-user"></i> First Name</label>
              <input type="text" placeholder="John" required />
            </div>
            <div class="form-group">
              <label><i class="fas fa-user"></i> Last Name</label>
              <input type="text" placeholder="Doe" required />
            </div>
          </div>

          <div class="form-group">
            <label><i class="fas fa-envelope"></i> Email Address</label>
            <input type="email" placeholder="you@example.com" required />
          </div>

          <div class="form-group">
            <label><i class="fas fa-lock"></i> Password</label>
            <input
              type="password"
              placeholder="••••••••"
              id="password"
              required
            />
            <div class="password-strength">
              <div class="password-strength-bar"></div>
            </div>
          </div>

          <div class="form-group">
            <label><i class="fas fa-lock"></i> Confirm Password</label>
            <input type="password" placeholder="••••••••" required />
          </div>

          <div id="sellerFields" style="display: none">
            <div class="form-group">
              <label><i class="fas fa-store"></i> Store Name</label>
              <input type="text" placeholder="Your store name" />
            </div>
            <div class="form-group">
              <label
                ><i class="fas fa-id-card"></i> Business License Number</label
              >
              <input type="text" placeholder="License number" />
            </div>
          </div>

          <div class="terms">
            <input type="checkbox" required />
            <span
              >I agree to the <a href="#">Terms of Service</a> and
              <a href="#">Privacy Policy</a></span
            >
          </div>

          <button type="submit" class="auth-button">Create Account</button>
        </form>

        <div class="divider">Or sign up with</div>

        <div class="social-buttons">
          <button class="social-btn" type="button">
            <i class="fab fa-google"></i> Google
          </button>
          <button class="social-btn" type="button">
            <i class="fab fa-apple"></i> Apple
          </button>
        </div>

        <div class="auth-footer">
          Already have an account? <a href="login.html">Sign in here</a>
        </div>
      </div>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', () => {
        let selectedAccountType = "buyer";
        const accountTypeButtons = document.querySelectorAll(".account-type-btn");
        const sellerFields = document.getElementById("sellerFields");
        const passwordInput = document.getElementById("password");
        const passwordStrengthBar = document.querySelector(
          ".password-strength-bar",
        );

        if (!sellerFields) console.error("sellerFields element missing");
        if (!passwordInput) console.error("password input missing");
        if (!passwordStrengthBar) console.error("passwordStrengthBar missing");

        accountTypeButtons.forEach((btn) => {
          btn.addEventListener("click", function () {
            accountTypeButtons.forEach((b) => b.classList.remove("active"));
            this.classList.add("active");
            selectedAccountType = this.dataset.type;

            if (this.dataset.type === "seller") {
              sellerFields.style.display = "block";
            } else {
              sellerFields.style.display = "none";
            }
          });
        });

        passwordInput?.addEventListener("input", function () {
          const strength = this.value.length;
          let percentage = 0;
          let color = "#ef4444";

          if (strength < 6) percentage = 33;
          else if (strength < 10) percentage = 66;
          else percentage = 100;

          if (percentage === 33) color = "#ef4444";
          else if (percentage === 66) color = "#f59e0b";
          else color = "#10b981";

          if (passwordStrengthBar) {
            passwordStrengthBar.style.width = percentage + "%";
            passwordStrengthBar.style.background = color;
          }
        });

        const signupForm = document.getElementById("signupForm");
        if (signupForm) {
          signupForm.addEventListener("submit", function (e) {
            e.preventDefault();
            console.log("signup form submitted");
            const displayNameInput = document.getElementById("displayName");
            const displayName = displayNameInput ? displayNameInput.value : "";

            localStorage.setItem("userDisplayName", displayName);
            localStorage.setItem("userEmail", document.querySelector('input[type="email"]')?.value || "");
            localStorage.setItem("userAccountType", selectedAccountType);

            alert("Account created successfully!");
            setTimeout(() => (window.location.href = "index.html"), 1000);
          });
        } else {
          console.error("signupForm not found");
        }
      });
    </script>
  </body>
</html>
